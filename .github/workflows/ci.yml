name: CI

on:
  push:
    branches: [main]
    tags: ['v[0-9]+.*']
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libxkbcommon-dev pkg-config

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

  release-macos:
    name: Release macOS ARM64
    runs-on: macos-15
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p re-gui

      - name: Package
        run: tar czf sleuthre-${GITHUB_REF_NAME}-macos-arm64.tar.gz -C target/release re-gui

      - name: Upload to GitHub Release
        run: gh release upload "${GITHUB_REF_NAME}" sleuthre-${GITHUB_REF_NAME}-macos-arm64.tar.gz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
